name: Build EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Installer dependances
      run: pip install pyinstaller psutil

    - name: Compiler EXE
      run: pyinstaller --onefile --windowed --name FrameRepublic frame_republic.py

    - name: Publier la release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Frame Republic v${{ github.run_number }}
        files: dist/FrameRepublic.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
